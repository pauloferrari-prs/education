services:
  app:
    image: ${APP_IMAGE}
    container_name: labphp-app
    restart: unless-stopped
    env_file:
      - ./.env.runtime
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - labphp-net

  nginx:
    image: nginx:1.27-alpine
    container_name: labphp-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - labphp-net

networks:
  labphp-net:
    name: labphp-net
    driver: bridge
