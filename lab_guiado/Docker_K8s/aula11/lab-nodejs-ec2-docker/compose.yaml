services:
  traefik:
    image: traefik:v3.6.16
    container_name: labnodejs-traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - labnodejs-net
    restart: unless-stopped

  app:
    image: ${APP_IMAGE}
    container_name: labnodejs-app
    env_file:
      - .env.runtime
    environment:
      PORT: "3000"
      NODE_ENV: production
    labels:
      - traefik.enable=true
      - traefik.http.routers.labnodejs.rule=PathPrefix(`/`)
      - traefik.http.routers.labnodejs.entrypoints=web
      - traefik.http.services.labnodejs.loadbalancer.server.port=3000
    networks:
      - labnodejs-net
    restart: unless-stopped
    cpus: "0.75"
    mem_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  labnodejs-net:
    name: labnodejs-net
